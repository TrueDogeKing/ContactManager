server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (sent on every response, including errors, via "always").
    # CSP matches a Vite production build: scripts/styles are served from this origin; the API is
    # same-origin (proxied below); 'unsafe-inline' is allowed for styles only (no code execution).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    # HSTS is intentionally omitted here: TLS terminates at the reverse proxy/ingress, which should
    # set Strict-Transport-Security.

    # Proxy API calls to the backend service (docker compose service "api").
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback – wszystkie ścieżki obsługuje index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck.
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
