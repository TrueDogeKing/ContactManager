server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback – wszystkie ścieżki obsługuje index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck.
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
