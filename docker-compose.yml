# Docker Compose – PhoneBook (Contacts Manager)
#
# Faza 0: tylko baza danych PostgreSQL.
# Usługi `api` i `frontend` zostaną dodane w Fazie 7 (pełna konteneryzacja).

services:
  postgres:
    image: postgres:16-alpine
    container_name: phonebook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phonebook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phonebook}
      POSTGRES_DB: ${POSTGRES_DB:-phonebook}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phonebook} -d ${POSTGRES_DB:-phonebook}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Dodane w Fazie 7 ---
