name: CI

# Validates every PR to main (and pushes to main): backend build + tests, frontend lint/typecheck/build.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ContactManager.slnx

      - name: Build
        run: dotnet build ContactManager.slnx -c Release --no-restore

      # Unit tests + integration tests. The integration suite uses Testcontainers, which spins up
      # PostgreSQL via the runner's Docker daemon (available on ubuntu-latest).
      - name: Test
        run: dotnet test ContactManager.slnx -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # The frontend pins npm via devEngines; install it (from the repo root, which has no devEngines)
      # so the project commands below satisfy the engine check.
      - name: Use pinned npm
        run: npm install -g npm@11.17.0
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm run build` is `tsc -b && vite build`, so this covers the typecheck and the production bundle.
      - name: Build
        run: npm run build
