name: contactmanager

services:
  postgres:
    image: postgres:16-alpine
    container_name: contactmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phonebook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phonebook}
      POSTGRES_DB: ${POSTGRES_DB:-phonebook}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - contactmanager-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phonebook} -d ${POSTGRES_DB:-phonebook}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  contactmanager-db:
